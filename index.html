<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HUBERSTRAUB AG - Rapport App</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="stylesheet" href="tailwind.min.css">
    <script src="xlsx-populate.min.js"></script>

    <style>
        /* Huberstraub AG Firmenfarbe (Rot) */
        :root {
            --huberstraub-red: #cc0000; /* Passe diesen Wert an, falls das Rot exakter sein muss */
            --huberstraub-red-dark: #a30000;
            --huberstraub-red-light: #ffeded;
        }

        body { background: #f8fafc; font-family: ui-sans-serif, system-ui; padding-bottom: 120px; }
        .card { background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; border: 1px solid #e2e8f0; shadow-sm; }
        .section-title { font-weight: 800; color: var(--huberstraub-red-dark); font-size: 0.85rem; text-transform: uppercase; border-bottom: 2px solid #e2e8f0; margin-bottom: 1.25rem; padding-bottom: 0.5rem; italic; }
        
        label { display: block; font-size: 0.7rem; font-weight: 700; color: #64748b; margin-bottom: 0.2rem; text-transform: uppercase; }
        input, textarea { width: 100%; border: 1.5px solid #cbd5e1; border-radius: 8px; padding: 0.7rem; font-size: 1rem; background: #fff; }
        input:focus { border-color: var(--huberstraub-red); outline: none; ring: 2px rgba(204, 0, 0, 0.1); }
        
        /* Banner-Stil */
        .header-bg { background: linear-gradient(135deg, var(--huberstraub-red) 0%, var(--huberstraub-red-dark) 100%); }
        
        /* Button-Stile */
        .btn-primary { background-color: var(--huberstraub-red); color: white; transition: all 0.2s; }
        .btn-primary:hover { background-color: var(--huberstraub-red-dark); }
        .btn-primary:disabled { background-color: #cbd5e1; cursor: not-allowed; opacity: 0.6; }
        
        /* Setup-Bereich Anpassung */
        .setup-card { border-color: var(--huberstraub-red); background-color: var(--huberstraub-red-light); }
        .setup-title { color: var(--huberstraub-red-dark); }
        .setup-text { color: var(--huberstraub-red); }
    </style>
</head>
<body class="max-w-2xl mx-auto p-4">

    <div id="setup" class="card setup-card border-2 text-center py-12 px-6 shadow-xl">
        <h1 class="setup-title text-2xl font-black mb-4 italic">HUBERSTRAUB AG</h1>
        <p class="setup-text text-lg font-bold mb-8">Rapport Digital - Initialisierung</p>
        <p class="text-sm text-slate-600 mb-6">Bitte wählen Sie die Excel-Vorlage aus, um zu starten.</p>
        <input type="file" id="fileInput" accept=".xlsx" class="max-w-xs mx-auto text-sm border-2 border-dashed border-red-300 rounded-lg p-2 bg-white">
    </div>

    <div id="mainForm" class="hidden animate-in fade-in duration-500">
        
        <header class="header-bg text-white p-6 rounded-2xl mb-6 shadow-xl flex items-center gap-5">
            <img src="icon.png" alt="Huberstraub Logo" class="w-16 h-16 rounded-xl shadow-md bg-white p-1">
            
            <div>
                <h1 class="text-3xl font-black italic">HUBERSTRAUB AG</h1>
                <p class="text-sm font-bold text-red-100 uppercase tracking-widest mt-1">Digitaler Bautenrapport</p>
            </div>
        </header>

        <div class="card">
            <h2 class="section-title">Allgemeine Informationen</h2>
            <div class="grid grid-cols-2 gap-4">
                <div class="col-span-2"><label>Firma (J2)</label><input type="text" data-cell="J2"></div>
                <div><label>Name (J3)</label><input type="text" data-cell="J3"></div>
                <div><label>Telefon (J4)</label><input type="text" data-cell="J4"></div>
                <div><label>Rapport Nr. (P2)</label><input type="text" data-cell="P2"></div>
                <div><label>Auftrag Nr. (P3)</label><input type="text" data-cell="P3"></div>
                <div class="col-span-2"><label>Datum (P4)</label><input type="date" data-cell="P4"></div>
                
                <div class="col-span-2 border-t pt-4 mt-2">
                    <label>Baustelle (B6)</label><input type="text" data-cell="B6" placeholder="Name der Baustelle">
                </div>
                <div><label>Baustellen Nr. (H6)</label><input type="text" data-cell="H6"></div>
                <div><label>Adresse (J6)</label><input type="text" data-cell="J6"></div>
                
                <div class="border-t pt-4 mt-2"><label>Geschoss (K8)</label><input type="text" data-cell="K8"></div>
                <div class="border-t pt-4 mt-2"><label>Etappe (P8)</label><input type="text" data-cell="P8"></div>
                <div class="col-span-2"><label>Bauteil (K9)</label><input type="text" data-cell="K9"></div>
                <div class="col-span-2"><label>Besonderes (P9)</label><input type="text" data-cell="P9"></div>

                <div class="col-span-2">
                    <label>Ausgeführte Arbeiten (A9-A11)</label>
                    <textarea data-cell="A9" rows="3" placeholder="Zusammenfassung der ausgeführten Arbeiten..."></textarea>
                </div>
            </div>
        </div>

        <div id="nextSections">
            <p class="text-center text-red-700 bg-red-50 text-xs italic py-10 border-2 border-red-200 border-dashed rounded-xl">
                Weitere Sektionen (Bohren, Fräsen, Stunden) werden hier eingefügt...
            </p>
        </div>

    </div>

    <div class="fixed bottom-0 left-0 right-0 p-4 bg-white/80 backdrop-blur-md border-t flex gap-3 z-50 shadow-inner">
        <button onclick="location.reload()" class="bg-slate-200 text-slate-600 px-6 py-4 rounded-xl font-bold active:scale-95 transition-transform">
            NEU
        </button>
        <button id="saveBtn" disabled onclick="generateExcel()" class="flex-grow btn-primary py-4 rounded-xl font-bold shadow-lg opacity-50 active:scale-95 transition-all text-lg">
            EXCEL SPEICHERN
        </button>
    </div>

    <script>
        let workbook = null;

        // Vorlage laden
        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (ev) => {
                try {
                    workbook = await XlsxPopulate.fromDataAsync(ev.target.result);
                    document.getElementById('setup').style.display = 'none';
                    document.getElementById('mainForm').classList.remove('hidden');
                    document.getElementById('saveBtn').disabled = false;
                    document.getElementById('saveBtn').classList.remove('opacity-50');
                } catch (err) {
                    alert("Fehler: Die Datei konnte nicht als Excel-Vorlage erkannt werden.");
                }
            };
            reader.readAsArrayBuffer(file);
        });

        // Excel generieren
        async function generateExcel() {
            if (!workbook) return;
            const sheet = workbook.sheet(0);

            // Alle Felder mit data-cell Attribut sammeln
            const inputs = document.querySelectorAll('[data-cell]');
            
            inputs.forEach(el => {
                const cell = el.getAttribute('data-cell');
                const val = el.value;

                if (val !== "") {
                    // Zahl oder Text entscheiden
                    const num = parseFloat(val);
                    const finalVal = (!isNaN(num) && isFinite(val)) ? num : val;
                    sheet.cell(cell).value(finalVal);
                }
            });

            // Download
            const blob = await workbook.outputAsync();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement("a");
            
            // Dateiname generieren
            const rapportNr = document.querySelector('[data-cell="P2"]').value || "Export";
            const baustelle = document.querySelector('[data-cell="B6"]').value || "Rapport";
            a.href = url;
            a.download = `HUBERSTRAUB_${rapportNr}_${baustelle}.xlsx`;
            
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
    </script>
</body>
</html>
